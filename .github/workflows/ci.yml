name: CI

# Tests the ForgeWorks template itself. Generation is deterministic (the
# interview writes an answers file; init-project/render.py renders it). What
# CI proves:
#   - sources        : shell/JSON syntax + the CLAUDE.md symlink + supply-chain pins.
#   - render-smoke   : core + each profile substitutes with NO leftover placeholders.
#   - golden-fixtures: render.py output is byte-for-byte identical to the committed
#                      expected trees across the answer matrix (AI/devcontainer/
#                      opt-ins/hostile values). Toolchains do NOT run here -- the
#                      profile jobs own "green on first run".
#   - deps-guard     : the supply-chain hook blocks/allows the expected commands.
#   - <lang>-profile : each profile's real gate + e2e is GREEN on the merged tree.
# It does NOT exercise the interview itself (the agent's questioning is judgment;
# everything after the answers file is render.py and is tested here).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Shell syntax (bash -n)
        run: |
          fail=0
          while IFS= read -r f; do bash -n "$f" || fail=1; done < <(git ls-files '*.sh')
          exit $fail
      - name: JSON validity (excluding JSONC devcontainers, which allow comments)
        run: |
          fail=0
          while IFS= read -r f; do
            case "$f" in */.devcontainer/*) continue;; esac
            python3 -m json.tool "$f" >/dev/null || { echo "bad JSON: $f"; fail=1; }
          done < <(git ls-files '*.json')
          exit $fail
      - name: CLAUDE.md is a symlink to AGENTS.md
        run: |
          test -L CLAUDE.md && [ "$(readlink CLAUDE.md)" = "AGENTS.md" ] \
            || { echo "CLAUDE.md must be a symlink -> AGENTS.md"; exit 1; }
      - name: Supply-chain pins (SHA-pinned uses:, no pipe-to-shell)
        run: bash .github/scripts/pin_check.sh

  render-smoke:
    # Render core + each profile with safe values and assert NO leftover
    # {{PLACEHOLDER}} remains (template completeness). The conditional matrix
    # and hostile-value escaping are covered by golden-fixtures below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Render core+profile, assert no leftover placeholders
        run: python3 .github/scripts/render_smoke.py

  golden-fixtures:
    # Deterministic-generation proof: render.py output for each committed
    # answers fixture must match the committed expected tree byte-for-byte
    # (file set, contents, symlink targets, executable bits). On drift: if the
    # change is intentional, regenerate with
    #   python3 .github/scripts/golden_test.py --update
    # and commit the expected trees with the template change.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Render every golden fixture and compare byte-for-byte
        run: python3 .github/scripts/golden_test.py

  deps-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: deps-guard blocks/allows the expected commands
        run: bash .github/scripts/deps_guard_test.sh

  slice-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: slice-audit hook blocks/passes the expected ship commits
        run: bash .github/scripts/slice_audit_test.sh

  line-cap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: line-cap gate fails >200-line files, passes the scaffolds
        run: bash .github/scripts/line_cap_test.sh

  # Each profile job renders the MERGED core+profile tree (the shape a generated
  # project actually has) and runs the language's real gate + e2e runner on it.
  # Profile-only runs miss core/profile interactions (e.g. a formatter that
  # scans core files) -- the merged render is the contract "green on first run".
  python-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - run: uv python install 3.12
      - name: Render merged core+profile and run QA + e2e
        run: |
          python3 .github/scripts/render_smoke.py --emit python /tmp/py
          mkdir -p /tmp/py/.claude/skills && cp -R "$GITHUB_WORKSPACE/init-project" /tmp/py/.claude/skills/init-project
          cd /tmp/py
          uv sync
          uv run qa
          bash scripts/e2e.sh

  typescript-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Render merged core+profile and run QA + audit + e2e
        run: |
          python3 .github/scripts/render_smoke.py --emit typescript /tmp/ts
          mkdir -p /tmp/ts/.claude/skills && cp -R "$GITHUB_WORKSPACE/init-project" /tmp/ts/.claude/skills/init-project
          cd /tmp/ts
          npm install
          npm run qa
          npm audit --audit-level=high
          npm run e2e
      - name: eslint max-lines cap fires on a synthetic 201-line file
        run: |
          cd /tmp/ts
          python3 -c "open('src/toolong.ts','w').write(''.join(f'export const v{i} = {i};\n' for i in range(201)))"
          if npx eslint src/toolong.ts; then echo "line cap did NOT fire"; exit 1; fi
          rm src/toolong.ts

  go-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25"
      - name: Install golangci-lint (pinned + checksum-verified, matches the profile)
        run: |
          curl -sSfL -o /tmp/golangci-install.sh https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh
          echo "d32d3534af96cfd59546a084d22b213e8a47541cada5013aa8a84c4fa2589905  /tmp/golangci-install.sh" | sha256sum -c -
          sh /tmp/golangci-install.sh -b "$(go env GOPATH)/bin" v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Render merged core+profile and run QA + e2e
        run: |
          python3 .github/scripts/render_smoke.py --emit go /tmp/go
          mkdir -p /tmp/go/.claude/skills && cp -R "$GITHUB_WORKSPACE/init-project" /tmp/go/.claude/skills/init-project
          cd /tmp/go
          bash scripts/qa.sh
          bash scripts/e2e.sh

  rust-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          # Keep in lockstep with the profile's rust-toolchain.toml (the rendered
          # tree pins the same version; installing it up front avoids an
          # on-the-fly rustup download mid-gate). Cache is off (the cargo
          # workspace lives in /tmp/rust, not the repo root) and rustflags is
          # cleared so the profile's scripts alone define strictness.
          toolchain: "1.96"
          components: clippy,rustfmt
          cache: false
          rustflags: ""
      - name: Render merged core+profile and run QA + e2e
        run: |
          python3 .github/scripts/render_smoke.py --emit rust /tmp/rust
          mkdir -p /tmp/rust/.claude/skills && cp -R "$GITHUB_WORKSPACE/init-project" /tmp/rust/.claude/skills/init-project
          cd /tmp/rust
          bash scripts/qa.sh
          bash scripts/e2e.sh
