name: CI

# Tests the ForgeWorks template itself. These are SMOKE TESTS, not full-generation
# proof: generation is performed by an agent following init-project/SKILL.md (no
# deterministic renderer yet -- see docs/ROADMAP.md). What CI proves:
#   - sources       : shell/JSON syntax + the CLAUDE.md symlink.
#   - render-smoke  : core + each profile substitutes with NO leftover placeholders.
#   - deps-guard    : the supply-chain hook blocks/allows the expected commands.
#   - <lang>-profile: each profile's own quality gate is GREEN on a fresh install.
# It does NOT exercise the interview, the conditional matrix (AI/devcontainer/...),
# or hostile display-value escaping (that escaping is agent-executed).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Shell syntax (bash -n)
        run: |
          fail=0
          while IFS= read -r f; do bash -n "$f" || fail=1; done < <(git ls-files '*.sh')
          exit $fail
      - name: JSON validity (excluding JSONC devcontainers, which allow comments)
        run: |
          fail=0
          while IFS= read -r f; do
            case "$f" in */.devcontainer/*) continue;; esac
            python3 -m json.tool "$f" >/dev/null || { echo "bad JSON: $f"; fail=1; }
          done < <(git ls-files '*.json')
          exit $fail
      - name: CLAUDE.md is a symlink to AGENTS.md
        run: |
          test -L CLAUDE.md && [ "$(readlink CLAUDE.md)" = "AGENTS.md" ] \
            || { echo "CLAUDE.md must be a symlink -> AGENTS.md"; exit 1; }

  render-smoke:
    # Deterministically render core + each profile with safe values and assert NO
    # leftover {{PLACEHOLDER}} remains (template completeness). Does NOT test the
    # interview, conditional matrix, or hostile-value escaping (agent-executed).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Render core+profile, assert no leftover placeholders
        run: python3 .github/scripts/render_smoke.py

  deps-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: deps-guard blocks/allows the expected commands
        run: bash .github/scripts/deps_guard_test.sh

  python-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - name: Generate Python project from the profile and run QA
        run: |
          mkdir -p /tmp/py && cp -R init-project/templates/profiles/python/. /tmp/py/
          cd /tmp/py
          mv pyproject.toml.example pyproject.toml
          sed -i 's/{{PROJECT_SLUG}}/fw-ci/g; s/{{PROJECT_NAME}}/fw-ci/g; s/{{PROJECT_GOAL}}/ci smoke/g' pyproject.toml
          uv sync
          uv run qa

  typescript-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Generate TS project from the profile and run QA + audit
        run: |
          mkdir -p /tmp/ts && cp -R init-project/templates/profiles/typescript/. /tmp/ts/
          cd /tmp/ts
          sed -i 's/{{PROJECT_SLUG}}/fw-ci/g; s/{{PROJECT_NAME}}/fw-ci/g; s/{{PROJECT_GOAL}}/ci smoke/g' package.json
          npm install
          npm run qa
          npm audit --audit-level=high
          npm run e2e

  go-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install golangci-lint (pinned, matches the profile)
        run: |
          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate Go project from the profile and run QA
        run: |
          mkdir -p /tmp/go && cp -R init-project/templates/profiles/go/. /tmp/go/
          cd /tmp/go
          sed -i 's/{{PROJECT_SLUG}}/fw-ci/g; s/{{PROJECT_NAME}}/fw-ci/g' go.mod
          bash scripts/qa.sh
